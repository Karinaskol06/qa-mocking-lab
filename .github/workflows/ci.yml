name: CI Pipeline

on:
  push:
    branches: [ main, develop, lab10-mock-tests ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || true

      - name: Run unit tests with coverage
        run: npm run test:coverage -- --coverageReporters="json-summary" --coverageReporters="text" --coverageReporters="lcov"
        env:
          CI: true

      - name: Check coverage thresholds
        run: |
          # Перевіряємо, чи coverage перевищує 80%
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct' | tr -d '"')
            echo "Lines coverage: $COVERAGE%"
          
            # Порівнюємо з 80% (bc -l для дробових чисел)
            if (( $(echo "$COVERAGE < 80" | bc -l) )); then
              echo "Coverage is below 80% (actual: $COVERAGE%)"
              exit 1
            else
              echo "Coverage is above 80% (actual: $COVERAGE%)"
            fi
          else
            echo "Coverage summary file not found"
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: coverage-report
          path: coverage/

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: test-results/